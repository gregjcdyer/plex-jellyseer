version: '3.9'
services:
  plex-to-jellyseerr:
    build: .
    container_name: plex-to-jellyseerr
    env_file:
      - .env
    command: >
      sh -c "echo '*/10 * * * * /usr/local/bin/python /app/app.py >> /var/log/cron.log 2>&1'
      | crontab - && cron -f"
    restart: always
    network_mode: host
